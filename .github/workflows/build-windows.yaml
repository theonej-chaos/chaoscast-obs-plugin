name: Build Windows Plugin
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Environment
        id: setup
        shell: pwsh
        run: |
          $BuildSpec = Get-Content -Path buildspec.json -Raw | ConvertFrom-Json
          "pluginName=$($BuildSpec.name)" >> $env:GITHUB_OUTPUT
          "pluginVersion=$($BuildSpec.version)" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-ci-x64

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-x64 --config RelWithDebInfo --parallel

      - name: Package
        shell: pwsh
        run: |
          cmake --install build_x64 --prefix release --config RelWithDebInfo
          # Find the built DLL
          $dll = Get-ChildItem -Path release -Recurse -Filter "*.dll" | Select-Object -First 1
          if ($dll) {
            Write-Host "Built DLL: $($dll.FullName)"
            Copy-Item $dll.FullName -Destination "$env:GITHUB_WORKSPACE/chaoscast-plugin.dll"
          }
          # Also zip the full release folder
          Compress-Archive -Path release/* -DestinationPath "$env:GITHUB_WORKSPACE/chaoscast-obs-plugin-windows-x64.zip"

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          # The DLL is already at the workspace root from the Package step
          # installer.nsi expects chaoscast-plugin.dll and data/ in the same directory
          # Verify files exist
          if (!(Test-Path "chaoscast-plugin.dll")) {
            Write-Error "chaoscast-plugin.dll not found"
            exit 1
          }
          if (!(Test-Path "data/locale/en-US.ini")) {
            Write-Error "data/locale/en-US.ini not found"
            exit 1
          }
          # NSIS is pre-installed on windows-2022 runners
          makensis installer.nsi
          if (Test-Path "ChaosCast-OBS-Plugin-Setup.exe") {
            Write-Host "Installer built successfully"
            Get-Item "ChaosCast-OBS-Plugin-Setup.exe" | Select-Object Name, Length
          } else {
            Write-Error "Installer not found after makensis"
            exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chaoscast-obs-plugin-${{ steps.setup.outputs.pluginVersion }}-windows-x64
          path: |
            ${{ github.workspace }}/chaoscast-obs-plugin-windows-x64.zip
            ${{ github.workspace }}/chaoscast-plugin.dll
            ${{ github.workspace }}/ChaosCast-OBS-Plugin-Setup.exe
