name: Build Windows Plugin
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Environment
        id: setup
        shell: pwsh
        run: |
          $BuildSpec = Get-Content -Path buildspec.json -Raw | ConvertFrom-Json
          "pluginName=$($BuildSpec.name)" >> $env:GITHUB_OUTPUT
          "pluginVersion=$($BuildSpec.version)" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-ci-x64

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-x64 --config RelWithDebInfo --parallel

      - name: Package
        shell: pwsh
        run: |
          cmake --install build_x64 --prefix release --config RelWithDebInfo
          # Find the built DLL
          $dll = Get-ChildItem -Path release -Recurse -Filter "*.dll" | Select-Object -First 1
          if ($dll) {
            Write-Host "Built DLL: $($dll.FullName)"
            Copy-Item $dll.FullName -Destination "$env:GITHUB_WORKSPACE/obs-multi-rtmp.dll"
          }
          # Also zip the full release folder
          Compress-Archive -Path release/* -DestinationPath "$env:GITHUB_WORKSPACE/chaoscast-obs-plugin-windows-x64.zip"

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          # Copy DLL next to installer script so NSIS can find it
          Copy-Item "$env:GITHUB_WORKSPACE/obs-multi-rtmp.dll" -Destination "$env:GITHUB_WORKSPACE/obs-multi-rtmp.dll" -ErrorAction SilentlyContinue
          Copy-Item "$env:GITHUB_WORKSPACE/obs-multi-rtmp.dll" -Destination "obs-multi-rtmp.dll"
          # NSIS is pre-installed on windows-2022 runners
          makensis installer.nsi
          # Move installer to workspace root
          Move-Item "ChaosCast-OBS-Plugin-Setup.exe" -Destination "$env:GITHUB_WORKSPACE/ChaosCast-OBS-Plugin-Setup.exe"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chaoscast-obs-plugin-${{ steps.setup.outputs.pluginVersion }}-windows-x64
          path: |
            ${{ github.workspace }}/chaoscast-obs-plugin-windows-x64.zip
            ${{ github.workspace }}/obs-multi-rtmp.dll
            ${{ github.workspace }}/ChaosCast-OBS-Plugin-Setup.exe
